services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Configure POSTGRES_USER in .env.docker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Configure POSTGRES_PASSWORD in .env.docker}
      POSTGRES_DB: ${POSTGRES_DB:?Configure POSTGRES_DB in .env.docker}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    expose:
      - "5432"
    volumes:
      - t20os_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: .
      target: dev
    restart: unless-stopped
    init: true
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      DIRECT_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://127.0.0.1:3000,http://localhost:3000}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    command: >
      sh -c "npx prisma migrate deploy &&
      npx prisma generate &&
      npm run dev:docker"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next_cache:/app/.next
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  t20os_pg:
  app_node_modules:
  app_next_cache:
